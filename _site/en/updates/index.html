<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/assets/css/style.css?v=0fe4c1c8fa0b9beb156f2e524b99e597432e9ae9">
    
    <style>
      @media screen and (min-width: 960px) {
        .wrapper {
          display: flex;
          flex-direction: row;
          gap: 40px;
          max-width: 1300px; /* Esto hace que el tope sea mucho más ancho */
          width: 95%; /* Hace que ocupe el 95% de la pantalla */
          margin: 0 auto; /* Mantiene todo el bloque centrado */
        }
        header {
          width: 280px;
          flex-shrink: 0;
          position: sticky;
          top: 40px;
          align-self: flex-start; /* ¡Esto es lo que faltaba para que funcione el sticky! */
        }
        section {
          flex-grow: 1; /* El contenido ocupa el resto del espacio */
        }
      }

      /* Estilos para la nueva barra superior */
      .top-nav {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 20px;
        background-color: #cc0000;
        padding: 15px 20px;
        margin-bottom: 30px;
      }
      .top-nav a {
        text-decoration: none;
        color: white;
        font-weight: bold;
        padding: 8px 16px;
        border-radius: 6px;
        transition: background-color 0.2s;
      }
      .top-nav a:hover {
        color: black;
        background-color: white; /* Color al pasar el ratón */
      }
      /* Esto hace que todos los enlaces (etiquetas <a>) sean rojos */
      a {
        color: #cc0000; /* Un rojo oscuro, más legible que el rojo puro */
        text-decoration: underline; /* Opcional: mantiene el subrayado si quieres */
      }
      a:hover {
          color: #cc0000; /* Un rojo más brillante cuando pasas el cursor */
          text-decoration: none; /* Opcional: quita el subrayado al pasar el ratón */
        }
      
      /* Estilos para las tarjetas de noticias */
      .news-card {
        background: #fff;
        border: 1px solid #e1e4e8;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        transition: transform 0.2s;
      }

      .news-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      }

      .news-date {
        font-size: 0.85em;
        color: #666;
        display: block;
        margin-bottom: 8px;
      }

      .news-title {
        margin-top: 0;
        color: #cc0000; /* Usamos tu rojo corporativo */
      }

      .news-tag {
        display: inline-block;
        background: #fae1d7;
        color: #000;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.75em;
        font-weight: bold;
        margin-bottom: 10px;
      }
    </style>
  </head>
